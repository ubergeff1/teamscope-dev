services:
  docmost:
    image: docmost/docmost:latest
    container_name: docmost
    depends_on:
      - db
      - redis
    environment:
      APP_URL: http://192.168.110.223:3000
      APP_SECRET: 5d93116f1ea4233bdb4c9e5bcc825ab8a70200f9ae1d29d23868c8553a78080e
      DATABASE_URL: postgresql://docmost:docmost@db:5432/docmost?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - docmost_storage:/app/data/storage

  db:
    image: postgres:16-alpine
    container_name: docmost-db
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: docmost
    restart: unless-stopped
    volumes:
      - docmost_db:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: docmost-redis
    restart: unless-stopped
    volumes:
      - docmost_redis:/data

  # ─── NocoDB (Notion-style databases) ────────────────────────────────
  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    environment:
      NC_DB: "pg://db:5432?u=docmost&p=docmost&d=nocodb"
    ports:
      - "8090:8080"
    restart: unless-stopped
    depends_on:
      - db

  # ─── Batch Manager Page ─────────────────────────────────────────────
  batch-ui:
    image: nginx:alpine
    container_name: docmost-batch
    restart: unless-stopped
    ports:
      - "3002:80"

volumes:
  docmost_storage:
  docmost_db:
  docmost_redis:
